name: publish-python

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: Publish Python verifier
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/allowly-receipt-format
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        working-directory: verifiers/python
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: verifiers/python/dist
