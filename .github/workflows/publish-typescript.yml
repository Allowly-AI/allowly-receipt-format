name: publish-typescript

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish TypeScript verifier
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@allowly/verifier
    defaults:
      run:
        working-directory: verifiers/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require tag commit on main
        run: |
          git fetch origin main
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "Tagged commit must be reachable from origin/main"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: npm ci
      - name: Run verifier tests
        run: npm test
      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag v$tag_version does not match package version $package_version"
            exit 1
          fi
      - name: Refuse to overwrite published version
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "$package_name@$package_version is already published"
            exit 1
          fi
      - name: Publish to npm
        run: npm publish --access public
